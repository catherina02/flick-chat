services:
  - type: web
    name: flick-chat-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py create_demo_accounts
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: ALLOWED_HOSTS
        value: flick-chat-api.onrender.com
      - key: SITE_URL
        value: https://flick-chat-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: flick-chat-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://flick-chat.vercel.app,http://localhost:5173"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://flick-chat.vercel.app"
      - key: REDIS_URL
        sync: false
      - key: FCM_SERVER_KEY
        sync: false

databases:
  - name: flick-chat-db
    plan: free
